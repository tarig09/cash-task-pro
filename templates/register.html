<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل جديد - كاش تاسك برو</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.card{background:#fff;padding:40px;border-radius:20px;width:400px;max-width:100%;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
.card h2{text-align:center;margin-bottom:25px;color:#333}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;font-size:16px}
button{width:100%;padding:12px;background:#4CAF50;color:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer;font-weight:bold}
button:hover{background:#45a049}
.link{text-align:center;margin-top:20px}
a{color:#667eea}
.flash{padding:10px;border-radius:10px;margin-bottom:15px;text-align:center}
.flash-success{background:#28a745;color:#fff}
.flash-danger{background:#dc3545;color:#fff}
</style>
</head>
<body>
<div class="card">
<h2>📝 إنشاء حساب جديد</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}
<form method="POST">
<input type="text" name="username" placeholder="👤 اسم المستخدم" required>
<input type="email" name="email" placeholder="📧 البريد الإلكتروني" required>
<input type="tel" name="phone" placeholder="📱 رقم الهاتف (للسحب)" required>
<input type="password" name="password" placeholder="🔒 كلمة المرور" required>
<button type="submit">✅ تسجيل</button>
</form>
<p class="link">لديك حساب؟ <a href="/login">تسجيل دخول</a></p>
</div>
</body>
</html>
